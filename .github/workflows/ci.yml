name: CI

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours — checks for new MJ release tags
  workflow_dispatch:        # Manual trigger
  push:
    branches: [main]        # Dev env tooling changes

concurrency:
  group: ci
  cancel-in-progress: true

jobs:
  check:
    name: Check for MJ release
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      mj_tag: ${{ steps.check.outputs.mj_tag }}
    steps:
      - name: Check latest MJ tag
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST_TAG=$(gh api repos/MemberJunction/MJ/tags --jq '.[0].name')
          echo "Latest MJ tag: $LATEST_TAG"
          echo "mj_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

          # Compare with our last known tag
          LAST_TAG=$(gh api "repos/${{ github.repository }}/actions/variables/MJ_LAST_TAG" --jq '.value' 2>/dev/null || echo "")
          echo "Last processed tag: $LAST_TAG"

          if [ "$LATEST_TAG" = "$LAST_TAG" ]; then
            echo "No new release — skipping"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "New release detected: $LAST_TAG → $LATEST_TAG"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  validate:
    name: Full validation
    runs-on: ubuntu-latest
    needs: [check]
    if: |
      always() &&
      (github.event_name != 'schedule' || needs.check.outputs.should_run == 'true')
    timeout-minutes: 45
    env:
      SQLCMDTRUST_SERVER_CERTIFICATE: 1
      GH_TOKEN: ${{ github.token }}
      MJ_CLI_PREFIX: ${{ github.workspace }}/.mj-cli

    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      # MJ CLI prefix on PATH for all subsequent steps
      - name: Setup CLI path
        run: |
          mkdir -p "$MJ_CLI_PREFIX/bin"
          echo "$MJ_CLI_PREFIX/bin" >> "$GITHUB_PATH"

      # ── Dev environment validation ────────────────────────
      - name: Build devShell and verify tools
        run: |
          nix develop --command bash -c '
            echo "Node: $(node --version)"
            echo "Git:  $(git --version)"
            echo "SQL:  $(sqlcmd --version 2>&1 | head -1)"
            echo "Nu:   $(nu --version)"
          '

      - name: Parse-check Nushell scripts
        run: |
          nix develop --command bash -c '
            export MJ_FLAKE_ROOT="$GITHUB_WORKSPACE"
            export MJ_REPO_DIR="/tmp/mj"
            SD="$GITHUB_WORKSPACE/scripts/nu"
            nu --commands "use $SD/common.nu *"
            for s in bootstrap catchup help nuke refresh review snapshot start status; do
              nu --commands "source $SD/$s.nu"
              echo "  ✓ $s.nu"
            done
          '

      # ── SQL Server ────────────────────────────────────────
      - name: Start SQL Server
        run: |
          docker rm -f mj-sqlserver 2>/dev/null || true
          mkdir -p "$HOME/.mj-snapshots"
          chmod 777 "$HOME/.mj-snapshots"
          docker run \
            -e "ACCEPT_EULA=Y" \
            -e "MSSQL_SA_PASSWORD=MJDevSA@Strong1!" \
            -p 1433:1433 \
            -v "$HOME/.mj-snapshots:/snapshots" \
            -d --name mj-sqlserver \
            mcr.microsoft.com/mssql/server:2022-CU18-ubuntu-22.04

      - name: Wait for SQL Server
        run: |
          nix develop --command bash -c '
            for i in $(seq 1 30); do
              sqlcmd -S localhost,1433 -U sa -P "MJDevSA@Strong1!" -C \
                -Q "SELECT 1" &>/dev/null && echo "Ready" && exit 0
              sleep 2
            done
            exit 1
          '

      - name: Initialize database
        run: |
          nix develop --command sqlcmd \
            -S localhost,1433 -U sa -P "MJDevSA@Strong1!" -C \
            -i scripts/sql/init-db.sql

      # ── MJ full build ────────────────────────────────────
      - name: Clone MJ
        run: git clone --depth 1 https://github.com/MemberJunction/MJ.git /tmp/mj

      - name: Setup MJ environment
        run: |
          cp templates/.env.template /tmp/mj/.env
          nix develop --command npm install -g @memberjunction/cli --prefix "$MJ_CLI_PREFIX"

      - name: Migrate
        run: nix develop --command bash -c 'cd /tmp/mj && mj migrate'

      - name: Codegen
        run: nix develop --command bash -c 'cd /tmp/mj && mj codegen'

      - name: Build
        run: nix develop --command bash -c 'cd /tmp/mj && npm ci && npm run build'

      # ── Publish snapshot ──────────────────────────────────
      - name: Publish snapshot
        run: |
          mkdir -p "$HOME/.mj-snapshots"
          chmod 777 "$HOME/.mj-snapshots"

          nix develop --command sqlcmd \
            -S localhost,1433 -U sa -P "MJDevSA@Strong1!" -C -Q \
            "BACKUP DATABASE [MJ_Local] TO DISK = '/snapshots/latest.bak' WITH COMPRESSION, INIT, FORMAT"

          gh release delete snapshot/latest --yes 2>/dev/null || true
          git push origin --delete snapshot/latest 2>/dev/null || true
          gh release create snapshot/latest \
            "$HOME/.mj-snapshots/latest.bak" \
            --title "Snapshot: latest" \
            --notes "Auto-published by CI on $(date -u +%Y-%m-%d). Built from MJ main."

      # ── Record processed tag ──────────────────────────────
      - name: Update last processed tag
        if: github.event_name == 'schedule'
        run: |
          TAG="${{ needs.check.outputs.mj_tag }}"
          gh api --method PATCH "repos/${{ github.repository }}/actions/variables/MJ_LAST_TAG" \
            -f name=MJ_LAST_TAG -f value="$TAG" 2>/dev/null \
          || gh api --method POST "repos/${{ github.repository }}/actions/variables" \
            -f name=MJ_LAST_TAG -f value="$TAG"
